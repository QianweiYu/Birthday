<!DOCTYPE html>
<html>
    <head>
        <title>Assignment 2</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <link rel='stylesheet' href='styles.css'>
    </head>
    <body>
        <div class="container">
            <h1>Making faces using svg</h1>
            <div class="d-flex justify-content-start mb-3">
                <button onclick="smile()" class="btn btn-primary m-2">Smile</button>
                <button onclick="shocked()" class="btn btn-primary m-2">Shocked</button> 
                <button onclick="daze()" class="btn btn-primary m-2">Daze</button>
                <button onclick="laugh()" class="btn btn-primary m-2">Laugh</button>
                <button onclick="reset()" class="btn btn-danger m-2">Reset</button>
            </div>
            <row>
                <svg width='600' height="600">
                    <!--Hints: 
                        1. you can use <g> tag to group elements as one face; remember to 
                            use the attribute transform = "translate(x, y)""
                        2. you should use the given style.css; given the elements correct
                            ids and classes, so they can appear as the style.css defined
                        3. you should use <path> to draw the mouth
                        4. face radius = 150; eye radius = 15
                    -->
                    <g id="upleft" transform="translate(0,0)">
                        <rect id="upleft1" width="300" height="300"></rect>
                        <circle class="face" cx="150" cy="150" r="150"></circle>
                        <circle class="eye" cx="75" cy="100" r="15"></circle>
                        <circle class="eye" cx="225" cy="100" r="15"></circle>
                        <line class="nose" x1="150" y1="100" x2="150" y2="160"></line>
                        <path class="mouth" d="M 75 200 C 125 240 175 240 225 200"></path>
                    </g>
                    <g id="upright" transform="translate(300,0)">
                        <rect id="upright1" width="300" height="300"></rect>
                        <circle class="face" cx="150" cy="150" r="150"></circle>
                        <circle class="eye" cx="75" cy="100" r="15"></circle>
                        <circle class="eye" cx="225" cy="100" r="15"></circle>
                        <line class="nose" x1="150" y1="100" x2="150" y2="160"></line>
                        <path class="mouth" d="M 75 220 C 125 180 175 180 225 220 Z" style="stroke-width:10px"></path>
                    </g>
                    <g id="lowleft" transform="translate(0,300)">
                        <rect id="lowleft1" width="300" height="300"></rect>
                        <circle class="face" cx="150" cy="150" r="150"></circle>
                        <circle class="eye" cx="75" cy="100" r="15"></circle>
                        <circle class="eye" cx="225" cy="100" r="15"></circle>
                        <line class="nose" x1="150" y1="100" x2="150" y2="160"></line>
                        <path class="mouth" d="M 75 220 C 125 220 175 220 225 220"></path>
                    </g>
                    <g id="lowright" transform="translate(300,300)">
                        <rect id="lowright1" width="300" height="300"></rect>
                        <circle class="face" cx="150" cy="150" r="150"></circle>
                        <circle class="eye" cx="75" cy="100" r="15"></circle>
                        <circle class="eye" cx="225" cy="100" r="15"></circle>
                        <line class="nose" x1="150" y1="100" x2="150" y2="160"></line>
                        <path class="mouth" d="M 75 200 C 125 240 175 240 225 200 Z" style="stroke-width:10px"></path>
                    </g>
                </svg>
            </row>
        </div>

    </body>
    <script>
        // Hints:
        // 1. you can set an id for each rectangle
        // 2. you can use document.getElementById() to select the element
        // 3. you can refere to the code of the function reset()   
        
        var selected_id = "";
        var color = ""
        var initialColors = {
            'upleft1': 'green',
            'upright1': 'pink',
            'lowleft1': 'orange',
            'lowright1': 'blue'
        };
        function smile(){
            reset();
            selected_id='upleft1'
            //color=document.getElementById('upleft1').style.fill;
            document.getElementById('upleft1').style.fill='red';
        };

        function shocked(){
            reset();
            selected_id='upright1'
            //color=document.getElementById('upright1').style.fill;
            document.getElementById('upright1').style.fill='red';
        };

        function daze(){
            reset();
            selected_id='lowleft1'
            //color=document.getElementById('lowleft1').style.fill;
            document.getElementById('lowleft1').style.fill='red';
        };

        function laugh(){
            reset();
            selected_id='lowright1'
            //color=document.getElementById('lowright1').style.fill;
            document.getElementById('lowright1').style.fill='red';
        };

        function reset(){
            if (selected_id!==""){
                document.getElementById(selected_id).style.fill=initialColors[selected_id];
            } 
            // document.getElementById('lowright').style.fill = 'red';
            selected_id = "";
            //color = ""; 
        };
    </script>
</html>
